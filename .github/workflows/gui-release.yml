name: GUI Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-gui:
    name: Build GUI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, macos-13, ubuntu-latest]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Make GUI distributables
        env:
          GITHUB_CLIENT_ID: ${{ secrets.GITHUB_CLIENT_ID }}
        run: npm run make -w packages/gui

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          find packages/gui/out/make -type f \( -name "*.dmg" -o -name "*.deb" \) -print0 \
            | xargs -0 gh release upload "${{ github.event.release.tag_name }}" --clobber
